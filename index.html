<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Portal</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.container {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

input, select, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: 1px solid gray;
}

button {
    background: #2a5298;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}
</style>
</head>

<body>

<h1>Job Application Portal</h1>
<p>Apply for available positions below</p>

<div class="container">
    <h2>Apply Now</h2>

    <!-- BADILISHA LINK HAPA -->
    <form action="https://formspree.io/f/mabcdxyz" method="POST">

        <!-- Job Selection -->
        <select name="job_title" required>
            <option value="">-- Select Job --</option>
            <option>Biomedical Engineer</option>
            <option>Nurse</option>
            <option>IT Specialist</option>
        </select>

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="number" name="age" placeholder="Age" required>

        <textarea name="message" placeholder="Why should we hire you?" required></textarea>

        <button type="submit">Submit Application</button>
    </form>
</div>

</body>
</html>

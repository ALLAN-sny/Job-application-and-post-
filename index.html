<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Careers</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f7; color: #222; text-align: center; margin: 0; padding: 0; }
        header { background: linear-gradient(90deg,#1a237e,#3949ab); color: #fff; padding: 40px 10px; }
        header h1 { font-family: 'Times New Roman', serif; font-size: 2.5em; color: #ff0000; margin: 0; }
        .intro { font-size: 1.1em; margin: 10px 0; color: #fff; }
        .job-card { background: #fff; border-radius: 12px; padding: 20px; margin: 15px auto; width: 90%; max-width: 500px; box-shadow: 0 5px 12px rgba(0,0,0,0.15); cursor: pointer; font-weight: bold; transition: .3s; }
        .job-card:hover { background: #e3eaff; transform: scale(1.02); }
        input, textarea, button { padding: 12px; margin: 8px 0; width: 90%; max-width: 400px; font-size: 1em; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #1a237e; color: #fff; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #3949ab; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        label { font-weight: bold; text-align: left; display: block; margin: 10px auto; width: 90%; max-width: 400px; }
        #applyForm { display: none; background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 500px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <h1>Bionex Company Limited</h1>
    <p class="intro">Welcome! I am Eng. Allan, Biomedical Engineer (MUHAS) & Developer.</p>
    <p class="intro">Explore available jobs and apply below.</p>
</header>

<h2>Available Jobs</h2>
<div id="jobsList"></div>

<div id="applyForm">
    <h2>Application Form</h2>
    <input id="name" type="text" placeholder="Full Name" required>
    <input id="age" type="number" placeholder="Age" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="phone" type="tel" placeholder="Phone Number" required>

    <div id="attachmentDiv">
        <label>Upload CV (PDF/Image):</label>
        <input type="file" id="attachment" accept="image/*,.pdf">
    </div>

    <div id="questionsDiv"></div>

    <button id="submitBtn" onclick="handleFormSubmit()">Submit Application</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
    emailjs.init("gCwHsyNsD024VEWx7");

    let selectedJobData = null;
    const jobsExample = [
        { title: "Software Engineer", cvRequired: true, questions: ["Web Dev Experience?", "Languages proficient in?"] },
        { title: "Biomedical Technician", cvRequired: true, questions: ["Diagnostic equipment used?", "Technical issue solved?"] },
        { title: "Mpesa transaction", cvRequired: false, questions: ["Experience in Mpesa?", "Customer service skills?"] }
    ];

    function loadJobs() {
        let jobsList = document.getElementById("jobsList");
        jobsList.innerHTML = "";
        jobsExample.forEach((job, index) => {
            let card = document.createElement("div");
            card.className = "job-card";
            card.textContent = job.title;
            card.onclick = () => selectJob(index);
            jobsList.appendChild(card);
        });
    }

    function selectJob(index) {
        selectedJobData = jobsExample[index];
        document.getElementById("applyForm").style.display = "block";
        document.getElementById("attachmentDiv").style.display = selectedJobData.cvRequired ? "block" : "none";
        
        let qDiv = document.getElementById("questionsDiv");
        qDiv.innerHTML = "";
        selectedJobData.questions.forEach((q, i) => {
            qDiv.innerHTML += `<label>${q}</label><textarea id="q${i}" placeholder="Your answer..."></textarea>`;
        });
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function handleFormSubmit() {
        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("name").value.trim();
        const age = document.getElementById("age").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const fileInput = document.getElementById("attachment");

        if (!name || !age || !email || !phone) {
            alert("Tafadhali jaza nafasi zote!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        let answers = selectedJobData.questions.map((_, i) => document.getElementById(`q${i}`).value);
        let fileData = "";

        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = () => saveAndFinish(reader.result);
        } else {
            saveAndFinish("");
        }

        async function saveAndFinish(attachment) {
            const newApp = { name, age, email, phone, job: selectedJobData.title, answers, attachment, date: new Date().toLocaleString() };
            
            // Save to LocalStorage
            let apps = JSON.parse(localStorage.getItem("apps")) || [];
            apps.push(newApp);
            localStorage.setItem("apps", JSON.stringify(apps));

            // EmailJS
            try {
                await emailjs.send("service_b11zlym", "template_j9v1gyq", {
                    name: name,
                    message: `New application for ${selectedJobData.title}`,
                    to_email: email
                });
            } catch (e) { console.log("Email failed", e); }

            alert("✅ Imepokelewa! Unapelekwa kwenye Dashboard sasa.");
            window.location.href = "admin.html"; // Hapa ndipo inapo-redirect
        }
    }

    loadJobs();
</script>
</body>
</html>

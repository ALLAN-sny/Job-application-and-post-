<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Careers</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        .hero { background: #0a192f; color: #ffca28; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: 20px auto; padding: 10px; }
        .job-card { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid #ffca28; margin-bottom: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #0a192f; color: #ffca28; padding: 15px; width: 100%; border: none; border-radius: 5px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
<div class="hero"><h1>BIONEX CAREERS</h1></div>
<div class="container">
    <div id="listView">
        <h3 id="load">Checking jobs...</h3>
        <div id="jobList"></div>
    </div>
    <div id="formView" class="hidden">
        <button onclick="location.reload()">← BACK</button>
        <h2 id="jobT"></h2>
        <form action="https://sheetdb.io/api/v1/2x8hezimvlj00" method="POST">
            <input type="hidden" name="POSITION" id="pField">
            <label>Name</label><input type="text" name="NAME" required>
            <label>Email</label><input type="email" name="EMAIL" required>
            <label>Phone</label><input type="text" name="PHONE" required>
            <button type="submit" class="btn">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>
<script>
    fetch("https://sheetdb.io/api/v1/2x8hezimvlj00")
    .then(res => res.json())
    .then(data => {
        document.getElementById("load").style.display = "none";
        const jobs = data.filter(r => r.TITLE && !r.NAME);
        document.getElementById("jobList").innerHTML = jobs.map(j => `
            <div class="job-card" onclick="openF('${j.TITLE}')">
                <strong>${j.TITLE}</strong><br><small>Apply Now →</small>
            </div>
        `).join('');
    });
    function openF(t) {
        document.getElementById("listView").classList.add("hidden");
        document.getElementById("formView").classList.remove("hidden");
        document.getElementById("jobT").innerText = t;
        document.getElementById("pField").value = t;
    }
</script>
</body>
</html>

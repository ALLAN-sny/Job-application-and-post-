<!DOCTYPE html>
<html>
<head>
<title>Job Application</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  background: #eef2f7;
  color: #222;
  text-align:center;
}
h1 { color: #1a237e; font-size: 2.5em; margin-bottom: 0.2em; }
h2 { color: #3949ab; font-size:2em; margin-top:0.5em; }
.job-card {
  background: #ffffff;
  border-radius: 12px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.15);
  text-align: left;
}
input, select, textarea, button {
  padding: 10px;
  margin: 8px 0;
  width: 90%;
  max-width: 400px;
  font-size: 1.1em;
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  background: #1a237e;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  border: none;
  transition: 0.3s;
}
button:hover { background: #3949ab; }
label { font-weight: bold; font-size: 1.1em; }
</style>
</head>
<body>

<h1>Welcome to MyBrand Careers</h1>
<p style="font-size:1.2em;">We value talent. Please fill out the application below carefully.</p>

<h2>Available Jobs</h2>
<div id="jobsList"></div>

<h2>Apply for a Job</h2>
<form id="applyForm">
<input id="name" placeholder="Full Name" required><br>
<input id="email" type="email" placeholder="Email" required><br>
<input id="phone" placeholder="Phone Number" required><br>
<select id="jobSelect" required></select><br>
<textarea id="q1" placeholder="Why do you want this job?" required></textarea><br>
<textarea id="q2" placeholder="Technical question / skills" required></textarea><br>
<input type="file" id="attachment"><br>
<button type="submit">Submit Application</button>
</form>

<script>
function loadJobs(){
  let jobs=JSON.parse(localStorage.getItem("jobs"))||[];
  let jobsList=document.getElementById("jobsList");
  let jobSelect=document.getElementById("jobSelect");
  jobsList.innerHTML="";
  jobSelect.innerHTML="";
  if(jobs.length===0){ jobsList.innerHTML="<p>No jobs available yet</p>"; jobSelect.innerHTML="<option disabled selected>No jobs</option>"; return;}
  jobs.forEach((job,index)=>{
    jobsList.innerHTML+=`
      <div class="job-card">
        <b>${job.title}</b><br>
        ${job.criteria}<br>
        <small>CV Required: ${job.cvRequired?"Yes":"No"}</small>
      </div>`;
    jobSelect.innerHTML+=`<option value="${index}">${job.title}</option>`;
  });
}

loadJobs();

document.getElementById("applyForm").addEventListener("submit",function(e){
  e.preventDefault();
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;
  let phone=document.getElementById("phone").value;
  let jobIndex=document.getElementById("jobSelect").value;
  let q1=document.getElementById("q1").value;
  let q2=document.getElementById("q2").value;
  if(jobIndex===""||jobIndex===null){ alert("Select a job"); return; }
  let jobs=JSON.parse(localStorage.getItem("jobs"))||[];
  let selectedJob=jobs[jobIndex];
  let fileInput=document.getElementById("attachment");
  let attachmentData="";
  if(fileInput.files.length>0){
    let reader=new FileReader();
    reader.onload=function(){ saveApplication(name,email,phone,selectedJob,q1,q2,reader.result);}
    reader.readAsDataURL(fileInput.files[0]);
  }else{
    saveApplication(name,email,phone,selectedJob,q1,q2,"");
  }
});

function saveApplication(name,email,phone,job,q1,q2,attachment){
  let applicants=JSON.parse(localStorage.getItem("apps"))||[];
  applicants.push({
    name,email,phone,
    jobTitle:job.title,
    criteria:job.criteria,
    cvRequired:job.cvRequired,
    q1,q2,
    attachment
  });
  localStorage.setItem("apps",JSON.stringify(applicants));
  alert("✅ Application Submitted!");
  document.getElementById("applyForm").reset();
}
</script>
</body>
</html>

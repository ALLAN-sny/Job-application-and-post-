<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h2>🔐 Admin Login</h2>

<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>

<div id="data"></div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

// 🔥 EMAILJS INIT (PUBLIC KEY YAKO)
(function(){
  emailjs.init("gCwHsyNsD024VEWx7");
})();

// 🔐 PASSWORD YA ADMIN
const ADMIN_PASSWORD = "12345";

// LOGIN FUNCTION
function login(){
  let password = document.getElementById("pass").value;

  if(password !== ADMIN_PASSWORD){
    alert("❌ Wrong Password");
    return;
  }

  let applicants = JSON.parse(localStorage.getItem("apps")) || [];

  let container = document.getElementById("data");
  container.innerHTML = "<h3>📋 Applicants List</h3>";

  applicants.forEach((a)=>{
    container.innerHTML += `
      <p>
        <b>${a.name}</b><br>
        ${a.email}<br>
        ${a.phone}
      </p>

      <button onclick="decide('${a.name}','${a.email}','accepted')">✅ Accept</button>
      <button onclick="decide('${a.name}','${a.email}','rejected')">❌ Reject</button>

      <hr>
    `;
  });
}

// 📩 SEND EMAIL FUNCTION
function decide(name, email, status){

  let message = "";

  if(status === "accepted"){
    message = "🎉 Congratulations! You have been selected for the job.";
  } else {
    message = "😔 Sorry, you were not selected this time.";
  }

  emailjs.send("service_b11zlym", "template_j9v1gyq", {
    name: name,
    message: message,
    to_email: email
  })
  .then(function(response) {
    alert("✅ Email sent successfully!");
  }, function(error) {
    alert("❌ Failed to send email");
  });

}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Apply Job</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f4f8;
      text-align: center;
      color: #333;
    }
    h2 { color: #2a2a72; font-size: 2em; }
    .job-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      margin: 15px auto;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }
    input, select, textarea, button {
      padding: 10px;
      margin: 8px 0;
      width: 90%;
      max-width: 400px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #2a2a72;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.3s;
    }
    button:hover { background: #4747c0; }
    label { font-weight: bold; }
  </style>
</head>
<body>

<h2>Available Jobs</h2>
<div id="jobsList"></div>

<h2>Apply for a Job</h2>
<form id="applyForm">
  <input id="name" placeholder="Full Name" required><br>
  <input id="email" placeholder="Email" type="email" required><br>
  <input id="phone" placeholder="Phone Number" required><br>
  <select id="jobSelect" required></select><br>
  <input type="file" id="attachment"><br>
  <button type="submit">Submit Application</button>
</form>

<script>
function loadJobs(){
  let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
  let jobsList = document.getElementById("jobsList");
  let jobSelect = document.getElementById("jobSelect");
  jobsList.innerHTML = "";
  jobSelect.innerHTML = "";

  if(jobs.length===0){
    jobsList.innerHTML = "<p>No jobs available yet.</p>";
    jobSelect.innerHTML = "<option disabled selected>No jobs</option>";
    return;
  }

  jobs.forEach((job, index)=>{
    jobsList.innerHTML += `
      <div class="job-card">
        <b>${job.title}</b><br>
        ${job.criteria}<br>
        <small>CV required: ${job.cvRequired ? 'Yes' : 'No'}</small>
      </div>
    `;
    jobSelect.innerHTML += `<option value="${index}">${job.title}</option>`;
  });
}

loadJobs();

document.getElementById("applyForm").addEventListener("submit", function(e){
  e.preventDefault();
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let jobIndex = document.getElementById("jobSelect").value;
  if(jobIndex === "" || jobIndex === null) { alert("Select a job"); return; }

  let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
  let selectedJob = jobs[jobIndex];

  // attachment handling
  let fileInput = document.getElementById("attachment");
  let attachmentData = "";
  if(fileInput.files.length>0){
    let file = fileInput.files[0];
    let reader = new FileReader();
    reader.onload = function(){
      saveApplication(name,email,phone,selectedJob,reader.result);
    }
    reader.readAsDataURL(file);
  } else {
    saveApplication(name,email,phone,selectedJob,"");
  }
});

function saveApplication(name,email,phone,job,attachment){
  let applicants = JSON.parse(localStorage.getItem("apps")) || [];
  applicants.push({
    name,email,phone,
    jobTitle: job.title,
    criteria: job.criteria,
    cvRequired: job.cvRequired,
    attachment
  });
  localStorage.setItem("apps", JSON.stringify(applicants));
  alert("✅ Application Submitted Successfully!");
  document.getElementById("applyForm").reset();
}
</script>
</body>
</html>

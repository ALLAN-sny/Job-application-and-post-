<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Careers | Apply Now</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        .header { background: var(--navy); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .container { max-width: 700px; margin: -20px auto 80px; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .job-box { background: #fff; border: 1px solid #eee; border-left: 5px solid var(--gold); padding: 20px; margin-bottom: 15px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
        label { display: block; margin-top: 20px; font-weight: bold; color: var(--navy); }
        input, textarea { width: 100%; padding: 14px; margin-top: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-send { background: var(--navy); color: var(--gold); border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="letter-spacing: 3px; margin: 0;">BIONEX COMPANY LIMITED</h1>
    <p>Founder & CEO: <strong>Eng. Allan</strong></p>
</div>

<div class="container">
    <div id="listView" class="card">
        <h2 style="text-align: center; color: var(--navy); margin-bottom: 25px;">Available Positions</h2>
        <div id="jobList">Loading vacancies...</div>
    </div>

    <div id="formView" class="card hidden">
        <div onclick="location.reload()" style="cursor:pointer; font-weight:bold; color:var(--navy); margin-bottom:20px;">← Back</div>
        <h2 id="jobT" style="margin:0; color:var(--navy);"></h2>
        <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
        
        <form id="applyForm">
            <input type="hidden" name="POSITION" id="hPos">
            
            <label>NAME</label>
            <input type="text" name="NAME" placeholder="Your Full Name" required>
            
            <label>EMAIL ADRESS</label>
            <input type="email" name="EMAIL ADRESS" placeholder="example@email.com" required>
            
            <label>PHONE NO:</label>
            <input type="tel" name="PHONE NO:" placeholder="07XXXXXXXX" required>

            <div id="qArea"></div>
            
            <button type="submit" id="sBtn" class="btn-send">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // Load Jobs
    fetch(API_URL).then(res => res.json()).then(data => {
        const jobs = data.filter(r => r.TITLE);
        const list = document.getElementById("jobList");
        list.innerHTML = jobs.length ? jobs.map(j => `
            <div class="job-box" onclick="showForm('${j.TITLE}', '${j.QUESTIONS}', '${j.REQUIRECV}')">
                <strong>${j.TITLE}</strong>
                <span style="color:var(--navy); font-weight:bold;">Apply →</span>
            </div>
        `).join('') : "No vacancies available.";
    });

    // Show Form
    function showForm(title, questions, cv) {
        document.getElementById("listView").classList.add("hidden");
        document.getElementById("formView").classList.remove("hidden");
        document.getElementById("jobT").innerText = title;
        document.getElementById("hPos").value = title;

        const qa = document.getElementById("qArea");
        qa.innerHTML = "";
        
        if(questions && questions !== "undefined" && questions !== "") {
            questions.split(",").forEach((q, i) => {
                qa.innerHTML += `<label>QUESTION: ${q.trim()}</label><textarea name="ANS_${i+1}" required></textarea>`;
            });
        }

        if(cv === "Yes") {
            qa.innerHTML += `<label>GOOGLE DRIVE CV LINK</label><input type="url" name="CV_LINK" required>`;
        }
    }

    // Submit Application
    document.getElementById("applyForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("sBtn").innerText = "Transmitting...";
        await fetch(API_URL, { method: "POST", body: new FormData(e.target) });
        alert("Application sent to Eng. Allan!");
        location.reload();
    });
</script>
</body>
</html>

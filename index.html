<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allan Careers Portal</title>

<style>
body {font-family: Arial; margin:0; background:#f4f6f9;}
header{background:#1e3c72;color:white;padding:30px;text-align:center;}
.container{padding:20px; max-width:900px; margin:auto;}
.job-card{background:white; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 3px 8px rgba(0,0,0,0.1);}
button{background:#1e3c72; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer;}
button:hover{background:#16325c;}
input,textarea{width:100%; padding:10px; margin:6px 0; border-radius:5px; border:1px solid #ccc;}
.form-section{background:white; padding:15px; border-radius:10px; margin-top:20px; display:none;}
#welcome{background:white;padding:20px;border-radius:10px;margin-bottom:20px;text-align:center;}
</style>
</head>

<body>

<header>
<h1>Allan Job Portal</h1>
<p>Connecting Talent with Opportunity</p>
</header>

<div class="container">

<!-- INTRO -->
<div id="welcome">
<h2>Welcome 👋</h2>
<p>
Hello, I am Allan – Biomedical Engineer & Developer from MUHAS.  
This platform allows you to apply for available jobs easily and professionally.  
Please explore opportunities below and submit your application.
</p>
<button onclick="showJobs()">View Jobs</button>
</div>

<!-- JOBS -->
<div id="jobsSection" style="display:none;">
<h2>Available Jobs</h2>
<div id="jobsList"></div>
</div>

<!-- FORM -->
<div id="applyForm" class="form-section">
<h3 id="applyJobTitle"></h3>

<form action="https://formspree.io/f/xpqoozrn" method="POST" enctype="multipart/form-data" target="_blank">
<input type="hidden" name="job_title" id="jobInput">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="text" name="phone" placeholder="Phone Number" required>
<input type="number" name="age" id="age">

<label id="skillsLabel" style="display:none">Skills</label>
<input type="text" name="skills" id="skills" style="display:none">

<label id="cvLabel" style="display:none">Upload CV / Certificates</label>
<input type="file" name="cv" id="cv" style="display:none">

<textarea name="message" id="msg" placeholder="Why should we hire you?"></textarea>

<button type="submit">Submit Application</button>
</form>
</div>

</div>

<script>
// SHOW JOBS
function showJobs(){
document.getElementById("welcome").style.display="none";
document.getElementById("jobsSection").style.display="block";
}

// JOBS DATA
const jobs = [
{
title:"Mpesa Agent",
description:"Handle mobile money transactions and customer service.",
criteria:{age:true, skills:true, cv:false, msg:true}
},
{
title:"IT Specialist",
description:"Manage systems. Upload all certificates.",
criteria:{age:true, skills:true, cv:true, msg:true}
},
{
title:"Biomedical Engineer",
description:"Maintain medical equipment. Upload all certificates.",
criteria:{age:true, skills:true, cv:true, msg:true}
}
];

// DISPLAY JOBS
const jobsList = document.getElementById("jobsList");
jobs.forEach((job,i)=>{
let div=document.createElement("div");
div.className="job-card";
div.innerHTML=`
<h3>${job.title}</h3>
<p>${job.description}</p>
<button onclick="apply(${i})">Apply</button>
`;
jobsList.appendChild(div);
});

// APPLY FUNCTION
function apply(i){
let job=jobs[i];
document.getElementById("applyForm").style.display="block";
document.getElementById("applyJobTitle").innerText="Apply for "+job.title;
document.getElementById("jobInput").value=job.title;

// dynamic fields
document.getElementById("age").style.display=job.criteria.age?"block":"none";
document.getElementById("skills").style.display=job.criteria.skills?"block":"none";
document.getElementById("skillsLabel").style.display=job.criteria.skills?"block":"none";
document.getElementById("cv").style.display=job.criteria.cv?"block":"none";
document.getElementById("cvLabel").style.display=job.criteria.cv?"block":"none";
document.getElementById("msg").style.display=job.criteria.msg?"block":"none";

window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Careers</title>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 0; }
        .h { background: #0a192f; color: #ffca28; padding: 30px; text-align: center; }
        .c { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; }
        .j { border-left: 5px solid #ffca28; padding: 15px; margin-bottom: 10px; cursor: pointer; background: #fafafa; display: flex; justify-content: space-between; }
        .hidden { display: none; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; box-sizing: border-box; }
        .btn { background: #0a192f; color: #ffca28; padding: 15px; width: 100%; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="h"><h1>BIONEX CAREERS</h1></div>

<div class="c">
    <div id="list">Loading...</div>

    <div id="form" class="hidden">
        <button onclick="location.reload()">← Back</button>
        <h2 id="jt"></h2>
        <form id="aForm">
            <input type="hidden" name="POSITION" id="hp">
            <label>NAME</label><input type="text" name="NAME" required>
            <label>EMAIL ADRESS</label><input type="email" name="EMAIL ADRESS" required>
            <label>PHONE NO:</label><input type="tel" name="PHONE NO:" required>
            <div id="qs"></div>
            <button type="submit" class="btn" id="sb">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // Load Jobs
    fetch(API).then(res => res.json()).then(data => {
        const jobs = data.filter(r => r.TITLE);
        const div = document.getElementById("list");
        if(jobs.length > 0) {
            div.innerHTML = jobs.map(j => `
                <div class="j" onclick="show('${j.TITLE}','${j.QUESTIONS}','${j.REQUIRECV}')">
                    <b>${j.TITLE}</b> <span>Apply →</span>
                </div>
            `).join('');
        } else { div.innerHTML = "No vacancies."; }
    });

    function show(t, q, cv) {
        document.getElementById("list").classList.add("hidden");
        document.getElementById("form").classList.remove("hidden");
        document.getElementById("jt").innerText = t;
        document.getElementById("hp").value = t;
        const qDiv = document.getElementById("qs");
        qDiv.innerHTML = "";
        if(q && q !== "undefined") {
            q.split(",").forEach((item, i) => {
                qDiv.innerHTML += `<label>${item}</label><textarea name="ANS_${i}" required></textarea>`;
            });
        }
    }

    // Submit Application
    document.getElementById("aForm").addEventListener("submit", function(e) {
        e.preventDefault();
        document.getElementById("sb").innerText = "Sending...";
        fetch(API, {
            method: 'POST',
            body: new FormData(this)
        }).then(() => {
            alert("Application Sent!");
            location.reload();
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Careers | Join Our Team</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--navy); color: white; padding: 60px 20px; text-align: center; border-bottom: 6px solid var(--gold); }
        .container { max-width: 800px; margin: -40px auto 100px; padding: 0 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .job-item { background: white; border: 1px solid #e2e8f0; border-left: 6px solid var(--gold); padding: 25px; margin-bottom: 15px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .job-item:hover { transform: translateX(10px); background: #fafafa; }
        .hidden { display: none; }
        label { display: block; margin-top: 20px; font-weight: bold; color: var(--navy); }
        input, textarea { width: 100%; padding: 15px; margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; background: #f8fafc; }
        .btn-apply { background: var(--navy); color: var(--gold); border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(10,25,47,0.2); }
    </style>
</head>
<body>

<div class="header">
    <h1 style="letter-spacing: 4px; margin: 0;">BIONEX COMPANY LIMITED</h1>
    <p style="opacity: 0.9; margin-top: 10px;">Engineering Health Solutions | CEO: <strong>Eng. Allan</strong></p>
</div>

<div class="container">
    <div id="listView" class="card">
        <h2 style="color: var(--navy); text-align: center; margin-bottom: 30px;">Open Positions</h2>
        <div id="jobContainer" style="text-align: center; color: #64748b;">Connecting to Bionex database...</div>
    </div>

    <div id="formView" class="card hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--navy); font-weight:bold; cursor:pointer; margin-bottom: 20px;">← VIEW OTHER POSITIONS</button>
        <h2 id="displayTitle" style="color: var(--navy); font-size: 2rem; margin: 0;"></h2>
        <p style="color: #64748b; margin-bottom: 30px;">Tafadhali jaza fomu hii kwa umakini ili kujiunga na timu yetu.</p>
        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 30px;">
        
        <form id="applicationForm">
            <input type="hidden" id="hiddenPosition">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label>FULL NAME</label><input type="text" id="app_name" required></div>
                <div><label>EMAIL ADRESS</label><input type="email" id="app_email" required></div>
            </div>
            
            <label>PHONE NO:</label>
            <input type="tel" id="app_phone" placeholder="07XXXXXXXX" required>
            
            <div id="dynamicQuestions"></div>
            
            <button type="submit" id="submitAppBtn" class="btn-apply">SUBMIT MY APPLICATION</button>
        </form>
    </div>
</div>

<script>
    const API_LINK = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // 1. Fetching logic
    function fetchVacancies() {
        fetch(API_LINK + "?v=" + new Date().getTime()) // Cache busting
        .then(res => res.json())
        .then(data => {
            const jobs = data.filter(r => r.TITLE && r.TITLE.trim() !== "");
            const container = document.getElementById("jobContainer");
            
            if(jobs.length > 0) {
                container.innerHTML = jobs.map(j => `
                    <div class="job-item" onclick="openApplication('${j.TITLE}', '${j.QUESTIONS}', '${j.REQUIRECV}')">
                        <div>
                            <div style="font-size: 1.2rem; font-weight: bold; color: var(--navy);">${j.TITLE}</div>
                            <div style="font-size: 0.8rem; color: #94a3b8;">ID: ${j.ID}</div>
                        </div>
                        <div style="font-weight: bold; color: var(--navy);">APPLY NOW →</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = "No active vacancies at the moment. Please check back later.";
            }
        });
    }

    // 2. Open Form
    function openApplication(title, questions, cv) {
        document.getElementById("listView").classList.add("hidden");
        document.getElementById("formView").classList.remove("hidden");
        document.getElementById("displayTitle").innerText = title;
        document.getElementById("hiddenPosition").value = title;
        
        const qBox = document.getElementById("dynamicQuestions");
        qBox.innerHTML = "";
        
        if(questions && questions !== "undefined" && questions.trim() !== "") {
            questions.split(",").forEach((q, i) => {
                qBox.innerHTML += `<label>${q.trim()}</label><textarea id="ans_${i}" required></textarea>`;
            });
        }
        
        if(cv === "Yes") {
            qBox.innerHTML += `<label>CV DOCUMENT (GOOGLE DRIVE LINK)</label><input type="url" id="cv_link" placeholder="https://drive.google.com/..." required>`;
        }
        window.scrollTo(0,0);
    }

    // 3. Submit Logic
    document.getElementById("applicationForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("submitAppBtn");
        btn.innerText = "TRANSMITTING APPLICATION...";
        btn.disabled = true;

        const applicationData = {
            "data": [{
                "NAME": document.getElementById("app_name").value,
                "EMAIL ADRESS": document.getElementById("app_email").value,
                "PHONE NO:": document.getElementById("app_phone").value,
                "POSITION": document.getElementById("hiddenPosition").value
            }]
        };

        fetch(API_LINK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(applicationData)
        })
        .then(() => {
            alert("Application successful! Eng. Allan will review your details.");
            location.reload();
        })
        .catch(() => {
            alert("Error: Imeshindikana kutuma.");
            btn.disabled = false;
            btn.innerText = "SUBMIT MY APPLICATION";
        });
    });

    fetchVacancies();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Apply Job</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h2>Available Jobs</h2>
<div id="jobsList"></div>

<h2>Apply for a Job</h2>
<input id="name" placeholder="Your Name"><br><br>
<input id="email" placeholder="Your Email"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>
<select id="jobSelect"></select><br><br>

<button onclick="apply()">Submit Application</button>

<script>
function loadJobs(){
  let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
  let jobsList = document.getElementById("jobsList");
  let jobSelect = document.getElementById("jobSelect");

  jobsList.innerHTML = "";
  jobSelect.innerHTML = "";

  if(jobs.length === 0){
    jobsList.innerHTML = "<p>❗ No jobs available yet</p>";
    jobSelect.innerHTML = "<option disabled selected>No jobs</option>";
    return;
  }

  jobs.forEach((job, index)=>{
    jobsList.innerHTML += `<p><b>${job.title}</b><br>${job.criteria}</p>`;
    jobSelect.innerHTML += `<option value="${index}">${job.title}</option>`;
  });
}

// Call loadJobs on page load
loadJobs();

function apply(){
  let applicants = JSON.parse(localStorage.getItem("apps")) || [];
  let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

  let jobIndex = document.getElementById("jobSelect").value;
  if(jobIndex === "" || !jobs[jobIndex]){
    alert("❌ Please select a valid job");
    return;
  }

  applicants.push({
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    job: jobs[jobIndex].title
  });

  localStorage.setItem("apps", JSON.stringify(applicants));
  alert("✅ Application Submitted Successfully!");
}
</script>

</body>
</html>

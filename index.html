<!DOCTYPE html>
<html>
<head>
    <title>Simple Job Portal</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input, textarea {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 5px;
        }

        .job {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Smart Job Portal</h1>

<h2>Post a Job (Employer)</h2>
<input type="text" id="title" placeholder="Job Title">
<input type="text" id="company" placeholder="Company Name">
<textarea id="desc" placeholder="Job Description"></textarea>
<button onclick="postJob()">Post Job</button>

<hr>

<h2>Available Jobs</h2>
<div id="jobs"></div>

<script>
function postJob() {
    let title = document.getElementById("title").value;
    let company = document.getElementById("company").value;
    let desc = document.getElementById("desc").value;

    let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

    jobs.push({title, company, desc});
    localStorage.setItem("jobs", JSON.stringify(jobs));

    displayJobs();
}

function displayJobs() {
    let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
    let container = document.getElementById("jobs");

    container.innerHTML = "";

    jobs.forEach((job, index) => {
        let div = document.createElement("div");
        div.className = "job";

        div.innerHTML = `
            <h3>${job.title}</h3>
            <p><b>${job.company}</b></p>
            <p>${job.desc}</p>

            <input type="text" id="name${index}" placeholder="Your Name">
            <textarea id="msg${index}" placeholder="Why should we hire you?"></textarea>
            <button onclick="apply(${index})">Apply</button>
        `;

        container.appendChild(div);
    });
}

function apply(index) {
    let name = document.getElementById("name"+index).value;
    let msg = document.getElementById("msg"+index).value;

    let applications = JSON.parse(localStorage.getItem("applications")) || [];

    applications.push({name, msg});
    localStorage.setItem("applications", JSON.stringify(applications));

    alert("Application sent!");
}

displayJobs();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h2>🔐 Admin Dashboard</h2>

<div id="loginBox">
  <input type="password" id="pass" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<div id="data"></div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

// 🔑 INIT EMAILJS
(function(){
  emailjs.init("gCwHsyNsD024VEWx7"); // Public Key yako
})();

// 🔐 PASSWORD YA ADMIN
const ADMIN_PASSWORD = "admin123";

// Angalia kama tayari ume-login
if(localStorage.getItem("isAdmin") === "true"){
  showDashboard();
}

// LOGIN FUNCTION
function login(){
  let password = document.getElementById("pass").value;

  if(password === ADMIN_PASSWORD){
    localStorage.setItem("isAdmin", "true");
    showDashboard();
  } else {
    alert("❌ Wrong password");
  }
}

// SHOW DASHBOARD
function showDashboard(){
  document.getElementById("loginBox").style.display = "none";

  let applicants = JSON.parse(localStorage.getItem("apps")) || [];
  let container = document.getElementById("data");

  if(applicants.length === 0){
    container.innerHTML = "<p>❗ No applicants yet</p>";
    return;
  }

  container.innerHTML = "<h3>Applicants List</h3>";

  applicants.forEach((a)=>{
    container.innerHTML += `
      <p>
        <b>${a.name}</b><br>
        ${a.email}<br>
        ${a.phone}
      </p>

      <button onclick="decide('${a.name}','${a.email}','accepted')">✅ Accept</button>
      <button onclick="decide('${a.name}','${a.email}','rejected')">❌ Reject</button>

      <hr>
    `;
  });
}

// SEND EMAIL FUNCTION
function decide(name, email, status){

  let message = status === "accepted"
    ? "🎉 Congratulations! You have been selected."
    : "😔 Sorry, you were not selected.";

  emailjs.send("service_b11zlym", "template_j9v1gyq", {
    name: name,
    message: message,
    to_email: email
  })
  .then(()=>{
    alert("✅ Email sent");
  })
  .catch(()=>{
    alert("❌ Failed");
  });

}

</script>

</body>
</html>

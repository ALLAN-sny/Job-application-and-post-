<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Careers</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; }
        .hero { background: var(--navy); color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .container { max-width: 700px; margin: -30px auto 100px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .job-card { border-left: 5px solid var(--gold); padding: 20px; background: #fff; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--navy); color: var(--gold); padding: 18px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>BIONEX COMPANY LIMITED</h1>
    <p>Founder & CEO: <strong>Eng. Allan</strong></p>
</div>

<div class="container">
    <div id="listView" class="card">
        <h2 style="color:var(--navy); text-align:center;">Current Vacancies</h2>
        <div id="jobList">Syncing...</div>
    </div>

    <div id="formView" class="card hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--navy); font-weight:bold; cursor:pointer;">← Back</button>
        <h2 id="dispT"></h2>
        <form id="applyForm">
            <input type="hidden" id="hPos" name="POSITION">
            <label>NAME</label><input type="text" id="aName" required>
            <label>EMAIL ADRESS</label><input type="email" id="aEmail" required>
            <label>PHONE NO:</label><input type="tel" id="aPhone" required>
            <div id="qArea"></div>
            <button type="submit" id="sBtn" class="btn">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    async function loadJobs() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const jobs = data.filter(r => r.TITLE && r.TITLE !== "");
        const list = document.getElementById("jobList");
        
        list.innerHTML = jobs.length ? jobs.map(j => `
            <div class="job-card" onclick="openForm('${j.TITLE}', '${j.QUESTIONS}', '${j.REQUIRECV}')">
                <strong>${j.TITLE}</strong>
                <span>Apply →</span>
            </div>
        `).join('') : "No vacancies at the moment.";
    }

    function openForm(t, q, cv) {
        document.getElementById("listView").classList.add("hidden");
        document.getElementById("formView").classList.remove("hidden");
        document.getElementById("dispT").innerText = t;
        document.getElementById("hPos").value = t;
        
        const area = document.getElementById("qArea");
        area.innerHTML = "";
        if(q && q !== "undefined") {
            q.split(",").forEach((ques, i) => {
                area.innerHTML += `<label>${ques.trim()}</label><textarea id="ans${i}"></textarea>`;
            });
        }
        if(cv === "Yes") {
            area.innerHTML += `<label>CV LINK</label><input type="url" id="cvL">`;
        }
    }

    document.getElementById("applyForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("sBtn");
        btn.innerText = "Sending...";
        
        const payload = {
            data: [{
                NAME: document.getElementById("aName").value,
                "EMAIL ADRESS": document.getElementById("aEmail").value,
                "PHONE NO:": document.getElementById("aPhone").value,
                POSITION: document.getElementById("hPos").value
            }]
        };

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        alert("Application Sent!");
        location.reload();
    });

    loadJobs();
</script>
</body>
</html>

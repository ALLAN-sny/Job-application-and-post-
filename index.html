<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Careers | Portal</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        .hero { background: var(--navy); color: white; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .container { max-width: 800px; margin: -30px auto 100px; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .job-card { 
            background: #fff; border: 1px solid #eee; border-left: 5px solid var(--gold); 
            padding: 20px; margin-bottom: 15px; border-radius: 10px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .job-card:hover { transform: translateX(10px); background: #fdfdfd; }
        .form-view { display: none; }
        label { display: block; margin-top: 20px; font-weight: bold; color: var(--navy); }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background: var(--navy); color: var(--gold); border: none; width: 100%; padding: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div class="hero">
    <h1 style="letter-spacing: 3px; margin: 0;">BIONEX COMPANY LIMITED</h1>
    <p>Founder & CEO: <strong>Eng. Allan</strong></p>
</div>

<div class="container">
    <div id="listView" class="card">
        <h2 style="text-align: center; color: var(--navy);">Available Vacancies</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">
        <div id="jobContainer">Loading vacancies...</div>
    </div>

    <div id="formView" class="card form-view">
        <div onclick="location.reload()" style="cursor:pointer; color:var(--navy); font-weight:bold; margin-bottom: 20px;">← Back to Vacancies</div>
        <h2 id="displayTitle" style="color:var(--navy); margin:0;"></h2>
        <p id="displayDesc" style="color:#666;"></p>
        <hr>
        <form id="applyForm">
            <input type="hidden" name="NAFASI" id="hNafasi">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label>Full Name</label><input type="text" name="JINA" required></div>
                <div><label>Age</label><input type="number" name="AGE" required></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label>Email</label><input type="email" name="EMAIL" required></div>
                <div><label>Phone</label><input type="tel" name="PHONE" required></div>
            </div>
            <div id="dynQuestions"></div>
            <button type="submit" id="sBtn" class="btn-submit">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // 1. Fetch Jobs
    fetch(API_URL).then(res => res.json()).then(data => {
        const jobs = data.filter(r => r.TITLE);
        const container = document.getElementById("jobContainer");
        container.innerHTML = jobs.length ? jobs.map(j => `
            <div class="job-card" onclick="openForm('${j.TITLE}', '${j.QUESTIONS}', '${j.ATTACHMENTREQUIRED}', '${j.DESCRIPTION || ''}')">
                <strong>${j.TITLE}</strong>
                <span style="color:var(--navy); font-weight:bold;">Apply →</span>
            </div>
        `).join('') : "No jobs posted yet.";
    });

    // 2. Open Form
    function openForm(title, questions, attach, desc) {
        document.getElementById("listView").style.display = "none";
        document.getElementById("formView").style.display = "block";
        document.getElementById("displayTitle").innerText = title;
        document.getElementById("displayDesc").innerText = desc;
        document.getElementById("hNafasi").value = title;
        
        const qArea = document.getElementById("dynQuestions");
        qArea.innerHTML = "";
        
        if(questions && questions !== "undefined") {
            questions.split(",").forEach((q, i) => {
                qArea.innerHTML += `<label>${q.trim()}</label><textarea name="ANSWER_${i+1}" required></textarea>`;
            });
        }
        
        if(attach === "Yes") {
            qArea.innerHTML += `<label>CV Link (Google Drive)</label><input type="url" name="CV_LINK" required>`;
        }
    }

    // 3. Submit
    document.getElementById("applyForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("sBtn").innerText = "Transmitting...";
        await fetch(API_URL, { method: "POST", body: new FormData(e.target) });
        alert("Application sent to Eng. Allan!");
        location.reload();
    });
</script>
</body>
</html>

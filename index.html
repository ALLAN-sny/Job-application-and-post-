<!DOCTYPE html>
<html>
<head>
<title>Bionex Careers</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  background: #eef2f7;
  color: #222;
  text-align:center;
  margin:0;
  padding:0;
}
header {
  background: linear-gradient(90deg,#1a237e,#3949ab);
  color:#fff;
  padding:30px 10px;
  text-align:center;
}
header h1 { font-size:3em; margin:0; }
header p { font-size:1.2em; margin:5px 0; }
.job-card {
  background:#fff;
  border-radius:12px;
  padding:20px;
  margin:15px auto;
  width:90%;
  max-width:500px;
  box-shadow:0 5px 12px rgba(0,0,0,0.15);
  text-align:center;
  cursor:pointer;
  font-weight:bold;
  font-size:1.3em;
  transition:.3s;
}
.job-card:hover { background:#e3eaff; }
input, textarea, button {
  padding:10px;
  margin:8px 0;
  width:90%;
  max-width:400px;
  font-size:1.1em;
  border-radius:6px;
  border:1px solid #ccc;
}
button {
  background:#1a237e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  border:none;
  transition:0.3s;
}
button:hover { background:#3949ab; }
label { font-weight:bold; font-size:1.1em; text-align:left; display:block; margin-top:10px; }
#applyForm { display:none; text-align:center; margin-top:20px; }
</style>
</head>
<body>

<header>
  <h1>Bionex Company Limited</h1>
  <p>Welcome! I am Eng. Allan, Biomedical Engineer (MUHAS) & Developer of this system.</p>
  <p>Explore available jobs and apply below.</p>
</header>

<h2>Available Jobs</h2>
<div id="jobsList"></div>

<form id="applyForm">
<h2>Application Form</h2>
<input id="name" placeholder="Full Name" required><br>
<input id="email" type="email" placeholder="Email" required><br>
<input id="phone" placeholder="Phone Number" required><br>

<div id="attachmentDiv">
<input type="file" id="attachment"><br>
</div>

<div id="questionsDiv">
<!-- Technical questions appear here -->
</div>

<button type="submit">Submit Application</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("gCwHsyNsD024VEWx7");

let selectedJobData=null;

// Jobs with technical questions
let jobsExample=[
  {
    title:"Software Engineer",
    cvRequired:true,
    questions:[
      "Describe your experience with web development.",
      "Which programming languages are you proficient in?",
      "Provide an example of a challenging technical problem you solved."
    ]
  },
  {
    title:"Biomedical Technician",
    cvRequired:true,
    questions:[
      "Describe your experience with biomedical devices.",
      "Which diagnostic equipment have you worked with?",
      "Explain a situation where you solved a technical issue."
    ]
  },
  {
    title:"IT Support",
    cvRequired:false,
    questions:[
      "Describe your experience in IT support.",
      "How do you troubleshoot network issues?",
      "Explain a time you resolved a critical IT problem."
    ]
  }
];

// Store example jobs in localStorage if empty
if(!localStorage.getItem("jobs")){
  localStorage.setItem("jobs",JSON.stringify(jobsExample));
}

function loadJobs(){
  let jobs=JSON.parse(localStorage.getItem("jobs"))||[];
  let jobsList=document.getElementById("jobsList");
  jobsList.innerHTML="";
  jobs.forEach((job,index)=>{
    let card=document.createElement("div");
    card.className="job-card";
    card.textContent=job.title; // Only job title
    card.onclick=()=>selectJob(index);
    jobsList.appendChild(card);
  });
}

function selectJob(index){
  let jobs=JSON.parse(localStorage.getItem("jobs"))||[];
  selectedJobData=jobs[index];
  document.getElementById("applyForm").style.display="block";

  // CV field visible only if required
  document.getElementById("attachmentDiv").style.display=selectedJobData.cvRequired?"block":"none";

  // Load technical questions with label + placeholder
  let questionsDiv=document.getElementById("questionsDiv");
  questionsDiv.innerHTML="";
  selectedJobData.questions.forEach((q,i)=>{
    let label = document.createElement("label");
    label.textContent = `Question ${i+1}: ${q}`;
    questionsDiv.appendChild(label);
    let textarea = document.createElement("textarea");
    textarea.id = "q"+(i+1);
    textarea.placeholder = "Type your answer here...";
    textarea.required = true;
    questionsDiv.appendChild(textarea);
  });
}

loadJobs();

document.getElementById("applyForm").addEventListener("submit",function(e){
  e.preventDefault();
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;
  let phone=document.getElementById("phone").value;
  
  // Collect answers dynamically
  let answers=[];
  selectedJobData.questions.forEach((q,i)=>{
    let ans=document.getElementById("q"+(i+1)).value;
    answers.push(ans);
  });

  let fileInput=document.getElementById("attachment");
  if(selectedJobData.cvRequired && fileInput.files.length===0){
    alert("This job requires a CV!"); return;
  }

  if(fileInput.files.length>0){
    let reader=new FileReader();
    reader.onload=function(){ saveApplication(name,email,phone,answers,reader.result);}
    reader.readAsDataURL(fileInput.files[0]);
  }else{
    saveApplication(name,email,phone,answers,"");
  }
});

function saveApplication(name,email,phone,answers,attachment){
  let applicants=JSON.parse(localStorage.getItem("apps"))||[];
  applicants.push({
    name,email,phone,
    jobTitle:selectedJobData.title,
    cvRequired:selectedJobData.cvRequired,
    answers,
    attachment
  });
  localStorage.setItem("apps",JSON.stringify(applicants));

  alert("✅ Your application has been submitted successfully!\n\nThank you for applying to Bionex Company Limited. We value your interest and will review your application carefully. You will receive a detailed notification soon via email regarding your application status.");

  // Send email
  emailjs.send("service_b11zlym","template_j9v1gyq",{
    name:name,
    message:`Dear ${name},\n\nThank you for applying to Bionex Company Limited for the position of ${selectedJobData.title}.\n\nWe have received your application along with your answers to the technical questions and any attachment provided.\n\nOur team will carefully review your application and contact you with further updates.\n\nBest regards,\nBionex Company Limited`,
    to_email:email
  }).then(()=>console.log("Email sent")).catch(()=>console.log("Email failed"));

  document.getElementById("applyForm").reset();
  document.getElementById("applyForm").style.display="none";
}
</script>
</body>
</html>

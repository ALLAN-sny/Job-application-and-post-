<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Careers</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        .hero { background: var(--navy); color: white; padding: 40px; text-align: center; border-bottom: 5px solid var(--gold); }
        .container { max-width: 600px; margin: 20px auto; }
        .job-card { background: white; padding: 20px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid var(--gold); cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .form-card { background: white; padding: 30px; border-radius: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-apply { background: var(--navy); color: var(--gold); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <h1>BIONEX CAREERS</h1>
    <p>CEO: Eng. Allan</p>
</div>

<div class="container">
    <div id="list">
        <h3 style="text-align:center; color: #666;">Checking for new vacancies...</h3>
    </div>

    <div id="form" class="hidden form-card">
        <button onclick="location.reload()" style="cursor:pointer; background:none; border:none; color:var(--navy); font-weight:bold;">← BACK</button>
        <h2 id="jobT" style="color:var(--navy);"></h2>
        <form id="appForm">
            <input type="hidden" id="hPos">
            <label>NAME</label><input type="text" id="uName" required>
            <label>EMAIL ADRESS</label><input type="email" id="uEmail" required>
            <label>PHONE NO:</label><input type="tel" id="uPhone" required>
            <div id="qArea"></div>
            <button type="submit" id="sBtn" class="btn-apply">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // Load Jobs with Cache Buster to ensure they show up immediately
    fetch(API + "?v=" + Math.random())
    .then(res => res.json())
    .then(data => {
        const jobs = data.filter(r => r.TITLE && r.TITLE.trim() !== "");
        const div = document.getElementById("list");
        if(jobs.length > 0) {
            div.innerHTML = jobs.map(j => `
                <div class="job-card" onclick="openJob('${j.TITLE}','${j.QUESTIONS}','${j.REQUIRECV}')">
                    <strong>${j.TITLE}</strong>
                    <span style="font-weight:bold; color:var(--navy);">Apply →</span>
                </div>
            `).join('');
        } else {
            div.innerHTML = "<p style='text-align:center;'>No jobs posted yet. Check back later.</p>";
        }
    });

    function openJob(t, q, cv) {
        document.getElementById("list").classList.add("hidden");
        document.getElementById("form").classList.remove("hidden");
        document.getElementById("jobT").innerText = t;
        document.getElementById("hPos").value = t;
        const qa = document.getElementById("qArea");
        qa.innerHTML = "";
        if(q && q !== "undefined" && q.trim() !== "") {
            q.split(",").forEach((ques, i) => {
                qa.innerHTML += `<label>${ques.trim()}</label><textarea id="ans${i}" required></textarea>`;
            });
        }
        if(cv === "Yes") {
            qa.innerHTML += `<label>CV DRIVE LINK</label><input type="url" id="cvL" required>`;
        }
    }

    document.getElementById("appForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const b = document.getElementById("sBtn");
        b.innerText = "Transmitting...";
        b.disabled = true;

        const payload = {
            "data": [{
                "NAME": document.getElementById("uName").value,
                "EMAIL ADRESS": document.getElementById("uEmail").value,
                "PHONE NO:": document.getElementById("uPhone").value,
                "POSITION": document.getElementById("hPos").value
            }]
        };

        fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(() => {
            alert("Application Sent to Eng. Allan!");
            location.reload();
        });
    });
</script>
</body>
</html>
